<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Sijil Ejen Penjaga Kemudahan Awam</title>
<style>
@page { size: A4; margin: 5mm; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Georgia', 'Times New Roman', serif;
  background: #FFF;
  color: #332211;
  width: 210mm; height: 297mm;
  padding: 12mm;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
/* Border hiasan */

body::after {
  content: '';
  position: absolute; top: 8mm; left: 8mm; right: 8mm; bottom: 8mm;
  border: 1px solid rgba(203,177,126,0.5);
  border-radius: 2px;
  pointer-events: none;
}
.border-corner {
  position: absolute; top: 5mm; left: 5mm; right: 5mm; bottom: 5mm;
  pointer-events: none;
}
.border-corner::before, .border-corner::after {
  content: '✦';
  position: absolute; font-size: 16pt; color: #CBB17E;
}
.border-corner::before { top: 3mm; left: 4mm; }
.border-corner::after { top: 3mm; right: 4mm; }
.border-corner .bl, .border-corner .br {
  position: absolute; font-size: 16pt; color: #CBB17E;
}
.border-corner .bl { bottom: 3mm; left: 4mm; }
.border-corner .br { bottom: 3mm; right: 4mm; }
.logo-sijil { width: 50mm; margin-bottom: 4mm; }
.pingat { font-size: 48pt; margin-bottom: 5mm; }
h1 {
  font-family: 'Impact', 'Arial Black', sans-serif;
  font-size: 26pt; color: #332211;
  text-shadow: 2px 2px 0 #CBB17E;
  text-align: center; margin-bottom: 8mm;
  letter-spacing: 1px;
}
.teks-sijil {
  font-size: 14pt; text-align: center;
  line-height: 1.8; margin-bottom: 8mm;
  font-family: 'Georgia', serif;
}
.teks-sijil .nama {
  display: inline-block; border-bottom: 2px solid #332211;
  padding: 0 10mm; font-family: 'Georgia', serif;
  font-size: 18pt; color: #4A90E2;
}
.tahniah {
  font-size: 12pt; color: #8E7CC3;
  font-style: italic; margin-bottom: 10mm;
}
.tandatangan {
  display: flex; justify-content: space-between;
  width: 100%; margin-top: 5mm;
}
.tandatangan .item { text-align: center; }
.tandatangan .garis {
  border-bottom: 1px solid #332211;
  width: 50mm; height: 8mm; margin-bottom: 2mm;
}
.tandatangan .label { font-size: 10pt; color: #665544; }
.cetak-nota {
  position: absolute; bottom: 10mm; left: 8mm;
  font-size: 7pt; color: #998866; font-style: italic;
}
.page-num { position: absolute; bottom: 5mm; right: 8mm; font-size: 9pt; color: #998866; }
</style>
</head>
<body>
<div class="border-corner">
  <div class="bl"></div>
  <div class="br"></div>
</div>
<img class="logo-sijil" src="../assets/icons/logo.png" alt="Logo Ejen Penjaga Kemudahan Awam">
<h1>SIJIL<br>EJEN PENJAGA<br>KEMUDAHAN AWAM</h1>
<div style="font-family:Arial;font-size:10pt;color:#887755;text-align:center;margin-bottom:3mm;">Pergerakan Puteri Islam Malaysia — Sekolah Kebangsaan</div>
<div class="teks-sijil">
  Diberikan kepada<br>
  <span class="nama">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span><br><br>
  kerana berjaya menyelesaikan<br>
  <strong>Treasure Hunt Kemudahan Awam</strong>
</div>
<div class="tahniah">✦ Tahniah! ✦</div>
<div class="tandatangan">
  <div class="item">
    <div class="garis"></div>
    <div class="label">Tarikh</div>
  </div>
  <div class="item">
    <div class="garis"></div>
    <div class="label">Tandatangan Guru</div>
  </div>
</div>
<div class="cetak-nota">* Kertas Ivory Card 230gsm disyorkan untuk cetakan sijil.</div>
<div class="page-num">Hlm 12/12</div>
<script src="toolbar.js"></script></body></html>
